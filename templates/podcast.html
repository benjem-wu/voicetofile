<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ podcast.name }} - VoiceToFile</title>
  <style>
    :root {
      --primary: #3b82f6;
      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;
      --purple: #7c3aed;
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-secondary: #64748b;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .back-btn { color: var(--primary); text-decoration: none; font-size: 14px; cursor: pointer; flex-shrink: 0; }
    .back-btn:hover { text-decoration: underline; }
    h1 { font-size: 18px; margin: 0; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .stats { display: flex; gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px; text-align: center; flex: 1; }
    .stat-num { font-size: 24px; font-weight: 700; }
    .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .stat-done .stat-num { color: var(--green); }
    .stat-pending .stat-num { color: var(--orange); }
    .stat-paid .stat-num { color: #9ca3af; }

    .actions { display: flex; gap: 8px; margin-bottom: 16px; }
    .btn { padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; font-weight: 500; }
    .btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    .btn-secondary:hover { background: #f1f5f9; }
    .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #2563eb; }

    table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    th { background: #f8fafc; text-align: left; padding: 10px 14px; font-size: 12px; color: var(--text-secondary); font-weight: 500; border-bottom: 1px solid var(--border); }
    td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }

    .col-title { width: auto; }
    .col-date { width: 110px; }
    .col-len { width: 90px; }
    .col-status { width: 100px; }
    .col-free { width: 70px; }

    .status-done { color: var(--green); font-weight: 500; cursor: pointer; text-decoration: underline; }
    .status-pending { color: var(--orange); cursor: pointer; text-decoration: none; }
    .status-processing { color: var(--purple); }
    .status-paid { color: #9ca3af; }
    .status-failed { color: var(--red); }
    .spin-icon { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .page-btns { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
    .page-info { text-align: center; color: var(--text-secondary); font-size: 13px; margin-top: 12px; }

    .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--red); }
    .toast.success { background: var(--green); }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <a class="back-btn" onclick="window.close()">✕ 关闭</a>
    <h1>📻 {{ podcast.name }}</h1>
  </div>

  <div class="stats" id="stats"></div>

  <div class="actions">
    <button class="btn btn-secondary" id="refresh-btn" onclick="refreshPage()">🔄 刷新</button>
    <button class="btn btn-primary" id="download-btn" onclick="downloadAll()">📥 全部下载</button>
  </div>

  <table>
    <thead>
      <tr>
        <th class="col-title">标题</th>
        <th class="col-date">发布时间</th>
        <th class="col-len">音频长度</th>
        <th class="col-status">状态</th>
        <th class="col-free">是否免费</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <div class="page-btns" id="page-btns"></div>
  <div class="page-info" id="page-info"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const podcastId = {{ podcast.id }};
let episodes = [];
let page = 1;
const PAGE_SIZE = 20;

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatDate(str) {
  if (!str) return '—';
  // str format: 2024-04-15T14:30:25 or 2024-04-15
  const d = new Date(str);
  if (isNaN(d)) return str.slice(0, 10);
  const m = (d.getMonth() + 1).toString().padStart(2, '0');
  const day = d.getDate().toString().padStart(2, '0');
  const hh = d.getHours().toString().padStart(2, '0');
  const mm = d.getMinutes().toString().padStart(2, '0');
  const ss = d.getSeconds().toString().padStart(2, '0');
  return `${m}-${day} ${hh}:${mm}:${ss}`;
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function loadEpisodes() {
  try {
    const resp = await fetch(`/api/podcast/${podcastId}/episodes`);
    const data = await resp.json();
    if (data.ok) {
      episodes = data.episodes;
      renderPage();
    }
  } catch (e) {
    showToast('加载失败', 'error');
  }
}

async function refreshPage() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  try {
    const resp = await fetch('/api/episodes/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ podcast_id: podcastId })
    });
    const data = await resp.json();
    if (data.ok) {
      showToast('刷新成功', 'success');
      await loadEpisodes();
    } else {
      showToast('刷新失败', 'error');
    }
  } catch (e) {
    showToast('刷新失败', 'error');
  } finally {
    btn.disabled = false;
  }
}

async function openTxt(episodeId) {
  try {
    const resp = await fetch(`/api/episode/open/${episodeId}`);
    const data = await resp.json();
    if (!data.ok) showToast(data.error || '打开失败', 'error');
  } catch (e) {
    showToast('打开失败', 'error');
  }
}

async function downloadAll() {
  const undone = episodes.filter(e => !e.is_paid && e.status !== 'done_deleted');
  if (undone.length === 0) { showToast('没有可下载的剧集', ''); return; }
  try {
    const resp = await fetch('/api/episodes/enqueue', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        podcast_id: podcastId,
        eids: undone.map(e => e.eid)
      })
    });
    const data = await resp.json();
    if (data.ok) {
      showToast(`已加入 ${undone.length} 个任务到队列`, 'success');
    } else {
      showToast('加入队列失败', 'error');
    }
  } catch (e) {
    showToast('加入队列失败', 'error');
  }
}

function renderPage() {
  const total = episodes.length;
  const paidCount = episodes.filter(e => e.is_paid).length;
  const doneCount = episodes.filter(e => e.status === 'done_deleted').length;
  const pendingCount = episodes.filter(e => !e.is_paid && e.status !== 'done_deleted').length;

  document.getElementById('stats').innerHTML = `
    <div class="stat-card stat-done">
      <div class="stat-num">${doneCount}</div>
      <div class="stat-label">已转化</div>
    </div>
    <div class="stat-card stat-pending">
      <div class="stat-num">${pendingCount}</div>
      <div class="stat-label">未转化</div>
    </div>
    <div class="stat-card stat-paid">
      <div class="stat-num">${paidCount}</div>
      <div class="stat-label">付费</div>
    </div>
  `;

  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (page > totalPages) page = totalPages;
  const start = (page - 1) * PAGE_SIZE;
  const slice = episodes.slice(start, start + PAGE_SIZE);

  document.getElementById('tbody').innerHTML = slice.map(ep => {
    const isDone = ep.status === 'done_deleted';
    const isPaid = ep.is_paid;
    const isFailed = ep.status === 'failed';
    const isProcessing = ep.status === 'downloading' || ep.status === 'transcribing';
    let statusHtml;
    if (isDone) {
      statusHtml = `<a class="status-done" onclick="openTxt(${ep.id})">已转化</a>`;
    } else if (isPaid) {
      statusHtml = '<span class="status-paid">不可转</span>';
    } else if (isFailed) {
      statusHtml = '<span class="status-failed">失败</span>';
    } else if (isProcessing) {
      statusHtml = '<span class="status-processing">◌ 处理中</span>';
    } else {
      statusHtml = '<span class="status-pending">未转化</span>';
    }
    const freeHtml = isPaid ? '<span class="status-paid">付费</span>' : '<span style="color:var(--green);">免费</span>';
    const xiaoyuzhouUrl = `https://www.xiaoyuzhoufm.com/episode/${ep.eid}`;
    return `<tr>
      <td class="col-title"><a href="${xiaoyuzhouUrl}" target="_blank" style="color:var(--text);text-decoration:none;">${isProcessing ? '<span class="spin-icon">◌</span>' : ''}${escapeHtml(ep.name)}</a></td>
      <td>${formatDate(ep.pub_date)}</td>
      <td>${ep.duration_str || '—'}</td>
      <td>${statusHtml}</td>
      <td>${freeHtml}</td>
    </tr>`;
  }).join('');

  // 分页按钮
  const btns = document.getElementById('page-btns');
  btns.innerHTML = '';
  if (totalPages > 1) {
    if (page > 1) {
      const prev = document.createElement('button');
      prev.className = 'btn btn-secondary';
      prev.textContent = '← 上一页';
      prev.onclick = () => { page--; renderPage(); window.scrollTo(0, 0); };
      btns.appendChild(prev);
    }
    if (page < totalPages) {
      const next = document.createElement('button');
      next.className = 'btn btn-secondary';
      next.textContent = '下一页 →';
      next.onclick = () => { page++; renderPage(); window.scrollTo(0, 0); };
      btns.appendChild(next);
    }
  }
  document.getElementById('page-info').textContent = `第 ${page} / ${totalPages} 页，共 ${total} 集`;
}

// 初始加载
loadEpisodes();
</script>
</body>
</html>
