<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>处理队列 - VoiceToFile</title>
  <style>
    :root {
      --primary: #3b82f6;
      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;
      --purple: #7c3aed;
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-secondary: #64748b;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
    .container { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 18px; margin-bottom: 20px; }
    .back-btn { display: inline-block; margin-bottom: 16px; color: var(--primary); text-decoration: none; font-size: 14px; }
    .back-btn:hover { text-decoration: underline; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; }
    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
    .progress-bar { height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
    .progress-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.3s; }
    .status-text { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; min-height: 16px; }
    .meta { display: flex; gap: 16px; font-size: 12px; color: var(--text-secondary); }
    .status { font-weight: 500; }
    .status-downloading { color: #1e40af; }
    .status-transcribing { color: var(--purple); }
    .status-pending { color: var(--orange); }
    .status-done { color: var(--green); }
    .status-failed { color: var(--red); }

    .item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; }
    .item-name { font-size: 14px; flex: 1; }
    .item-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .tag { font-size: 12px; padding: 3px 10px; border-radius: 12px; font-weight: 500; }
    .tag-pending { background: #fef3c7; color: #92400e; }
    .tag-done { background: #dcfce7; color: #166534; }
    .tag-failed { background: #fee2e2; color: #991b1b; }
    .remove-btn { font-size: 12px; padding: 3px 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text-secondary); cursor: pointer; flex-shrink: 0; text-decoration: none; display: inline-block; }
    .remove-btn:hover { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
    .stop-btn { font-size: 12px; padding: 3px 10px; border-radius: 12px; border: 1px solid var(--red); background: var(--card); color: var(--red); cursor: pointer; flex-shrink: 0; text-decoration: none; display: inline-block; }
    .stop-btn:hover { background: #fee2e2; }
    .stop-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .section-title { font-size: 13px; color: var(--text-secondary); margin: 20px 0 10px; }
    .empty { text-align: center; padding: 40px; color: var(--text-secondary); }
    .更新时间 { font-size: 12px; color: var(--text-secondary); margin-top: 20px; text-align: center; }
    .spin-icon { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">
  <a class="back-btn" href="javascript:window.close()">✕ 关闭</a>
  <h1>📋 处理队列</h1>

  <!-- 正在处理 -->
  <div id="current-area">
    <div class="card"><div class="empty">加载中...</div></div>
  </div>

  <!-- 排队中 -->
  <div id="queue-area"></div>

  <!-- 已完成 -->
  <div id="done-area"></div>

  <div class="更新时间" id="update-time"></div>
</div>

<script>
// ---- SSE 实时更新 ----
const evtSource = new EventSource('/sse/stream');

function formatElapsed(seconds) {
  if (!seconds) return '0秒';
  if (seconds < 60) return Math.round(seconds) + '秒';
  return Math.round(seconds / 60) + '分' + (Math.round(seconds % 60)) + '秒';
}

function renderTaskCard(task, showStop) {
  const isDownloading = task.status === 'downloading';
  const isTranscribing = task.status === 'transcribing';
  const statusLabel = isDownloading ? '音频下载中' : '音频转文字中';
  const statusClass = isDownloading ? 'status-downloading' : 'status-transcribing';
  const progress = task.progress || 0;
  const elapsed = formatElapsed(task.elapsed || 0);
  const stopBtn = showStop
    ? `<button class="stop-btn" id="stop-btn" onclick="stopCurrentTask()">终止任务</button>`
    : '';
  return `
    <div class="card">
      <div class="card-title">🎧 ${task.podcast_name} — ${task.name}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="status-text">${statusLabel} ${progress}%</div>
      <div class="meta">
        <span class="status ${statusClass}">${statusLabel}</span>
        <span>${progress}%</span>
        <span>已耗时 ${elapsed}</span>
        ${stopBtn}
      </div>
    </div>`;
}

function renderItem(ep, isQueue) {
  const isDone = ep.status === 'done_deleted';
  const isFailed = ep.status === 'failed';
  const tagClass = isDone ? 'tag-done' : 'tag-failed';
  const tagText = isDone ? '已完成' : '失败';
  const stopLink = isQueue
    ? `<form method="POST" style="display:inline;">
         <input type="hidden" name="episode_id" value="${ep.episode_id || ep.id}">
         <button type="submit" class="remove-btn">移除</button>
       </form>`
    : '';
  return `
    <div class="item">
      <div class="item-name">${ep.podcast_name} — ${ep.name}</div>
      ${stopLink}
      <span class="tag ${tagClass}">${isQueue ? '排队中' : tagText}</span>
    </div>`;
}

function updateQueueUI(tasks) {
  // 正在处理
  const active = tasks.filter(t => t.status === 'downloading' || t.status === 'transcribing');
  const currentArea = document.getElementById('current-area');
  if (active.length > 0) {
    currentArea.innerHTML = active.map(t => renderTaskCard(t, true)).join('');
  } else {
    currentArea.innerHTML = '<div class="card"><div class="empty">暂无正在处理的任务</div></div>';
  }

  // 排队中：DB 的 queued 任务
  const queued = tasks.filter(t => t.status === 'queued');
  const queueArea = document.getElementById('queue-area');
  if (queued.length > 0) {
    queueArea.innerHTML = `<div class="section-title">排队中（${queued.length} 个）</div>` + queued.map(t => renderItem(t, true)).join('');
  } else {
    queueArea.innerHTML = '';
  }

  // 已完成：done_deleted 和 failed
  const done = tasks.filter(t => t.status === 'done_deleted' || t.status === 'failed');
  const doneArea = document.getElementById('done-area');
  if (done.length > 0) {
    doneArea.innerHTML = `<div class="section-title">已完成（${done.length} 个）</div>` + done.map(t => renderItem(t, false)).join('');
  } else {
    doneArea.innerHTML = '';
  }

  document.getElementById('update-time').textContent = '页面自动刷新，每秒更新';
}

async function loadQueue() {
  try {
    const resp = await fetch('/api/queue');
    const data = await resp.json();
    // 纯 DB 数据，直接使用，不与 SSE 缓存 merge
    if (!window._cachedTasks) {
      window._cachedTasks = data.tasks || [];
    } else {
      // 保留 SSE 更新的进度，只用 API 数据补充缺失任务
      const cachedEids = new Set(window._cachedTasks.map(t => t.eid));
      for (const apiTask of (data.tasks || [])) {
        if (!cachedEids.has(apiTask.eid)) {
          window._cachedTasks.push(apiTask);
        }
      }
    }
    updateQueueUI(window._cachedTasks);
  } catch (e) {
    console.error('加载队列失败:', e);
  }
}

// SSE 任务更新事件：只更新已有任务，不在此创建（创建由 task_new 和 loadQueue 负责）
evtSource.addEventListener('task_update', (e) => {
  if (!window._cachedTasks) return;
  const task = JSON.parse(e.data);
  const idx = window._cachedTasks.findIndex(t => t.eid === task.eid);
  if (idx < 0) return; // task_update 不能创建任务，忽略；loadQueue 会补充
  const cached = window._cachedTasks[idx];
  const isTerminal = cached.status === 'done_deleted' || cached.status === 'failed';
  if (isTerminal) return; // 终态不受任何覆盖
  window._cachedTasks[idx] = { ...cached, ...task };
  updateQueueUI(window._cachedTasks);
});

evtSource.addEventListener('task_new', (e) => {
  // 即使 cache 未初始化也要处理（防止 loadQueue 前到达的 task_new 被丢弃）
  if (!window._cachedTasks) window._cachedTasks = [];
  const task = JSON.parse(e.data);
  if (!window._cachedTasks.find(t => t.eid === task.eid)) {
    window._cachedTasks.push(task);
    updateQueueUI(window._cachedTasks);
  }
});

evtSource.addEventListener('task_done', (e) => {
  if (!window._cachedTasks) return;
  const task = JSON.parse(e.data);
  // 只更新任务状态，不要删除（保留在已完成列表里）
  const idx = window._cachedTasks.findIndex(t => t.eid === task.eid);
  if (idx >= 0) {
    window._cachedTasks[idx] = { ...window._cachedTasks[idx], status: 'done_deleted' };
  } else {
    // 不在缓存里就加进来（处理初始化前已结束的任务）
    window._cachedTasks.push({ eid: task.eid, name: task.name, podcast_name: task.podcast_name, status: 'done_deleted' });
  }
  updateQueueUI(window._cachedTasks);
});

// 初始化时加载一次
loadQueue();
// 每秒轮询刷新（补充 SSE 可能漏掉的任务状态）
setInterval(loadQueue, 1000);

// ---- 终止按钮逻辑 ----
let _stopBtnDisabled = false;

async function stopCurrentTask() {
  if (_stopBtnDisabled) return;
  const btn = document.getElementById('stop-btn');
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = '终止中...';
  _stopBtnDisabled = true;
  try {
    await fetch('/api/queue/stop');
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '终止任务';
    _stopBtnDisabled = false;
  }
}

// task_stop 事件：显示确认弹框
evtSource.addEventListener('task_stop', (e) => {
  const data = JSON.parse(e.data);
  _stopBtnDisabled = false;
  showStopDialog(data);
});

function showStopDialog(data) {
  // 移除已有弹框
  const existing = document.getElementById('stop-dialog-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'stop-dialog-overlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';

  if (!data.audio_complete) {
    // 音频不完整：直接显示提示，用户确认后任务自动变为 pending
    overlay.innerHTML = `
      <div style="background:white;border-radius:12px;padding:24px 32px;max-width:360px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.15);position:relative;">
        <button onclick="closeStopDialog()" style="position:absolute;top:12px;right:12px;background:none;border:none;font-size:18px;cursor:pointer;color:#64748b;">✕</button>
        <div style="font-size:18px;margin-bottom:16px;">🗑️ 已终止</div>
        <div style="font-size:14px;color:#64748b;margin-bottom:20px;">音频不完整，已删除。任务已重置为未转化。</div>
        <button onclick="closeStopDialog()" style="padding:8px 24px;border-radius:8px;border:none;background:#3b82f6;color:white;cursor:pointer;font-size:14px;">知道了</button>
      </div>`;
  } else {
    // 音频完整：3选项 + 右上角X（关闭=继续）
    overlay.innerHTML = `
      <div style="background:white;border-radius:12px;padding:24px 32px;max-width:380px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.15);position:relative;">
        <button onclick="continueTask()" style="position:absolute;top:12px;right:12px;background:none;border:none;font-size:18px;cursor:pointer;color:#64748b;">✕</button>
        <div style="font-size:18px;margin-bottom:16px;">⏸️ 已终止</div>
        <div style="font-size:14px;color:#64748b;margin-bottom:20px;">音频已保留，如何处理此任务？</div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <button onclick="continueTask()" style="padding:10px 20px;border-radius:8px;border:1px solid #e2e8f0;background:white;color:#1f2328;cursor:pointer;font-size:14px;font-weight:500;">继续</button>
          <button onclick="pauseTask('${data.eid}')" style="padding:10px 20px;border-radius:8px;border:none;background:#7c3aed;color:white;cursor:pointer;font-size:14px;font-weight:500;">暂停（保留音频）</button>
          <button onclick="resetTask('${data.eid}')" style="padding:10px 20px;border-radius:8px;border:none;background:#dc2626;color:white;cursor:pointer;font-size:14px;font-weight:500;">重置（删除音频）</button>
        </div>
      </div>`;
  }
  document.body.appendChild(overlay);
}

function closeStopDialog() {
  const overlay = document.getElementById('stop-dialog-overlay');
  if (overlay) overlay.remove();
  const btn = document.getElementById('stop-btn');
  if (btn) {
    btn.disabled = false;
    btn.textContent = '终止任务';
  }
}

// 继续：关闭弹框，任务继续运行
async function continueTask() {
  closeStopDialog();
  // 不做任何 API 调用，任务继续
}

// 暂停：杀死子进程，audio_path 保留音频，状态改为 paused
async function pauseTask(eid) {
  closeStopDialog();
  const episodeId = getEpisodeIdByEid(eid);
  if (!episodeId) return;
  try {
    await fetch(`/api/episode/pause/${episodeId}`, { method: 'POST' });
    loadQueue();
  } catch (e) {
    console.error('暂停失败:', e);
  }
}

// 重置：杀死子进程，删除音频，状态改为 pending
async function resetTask(eid) {
  closeStopDialog();
  const episodeId = getEpisodeIdByEid(eid);
  if (!episodeId) return;
  try {
    await fetch(`/api/episode/reset/${episodeId}`, { method: 'POST' });
    loadQueue();
  } catch (e) {
    console.error('重置失败:', e);
  }
}

function getEpisodeIdByEid(eid) {
  if (!window._cachedTasks) return null;
  const task = window._cachedTasks.find(t => t.eid === eid);
  return task ? (task.episode_id || task.id) : null;
}
</script>
</body>
</html>
