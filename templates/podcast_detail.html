<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ podcast.name }} — VoiceToFile</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f2f5; --card: #fff; --border: #e1e4e8; --primary: #2563eb;
    --primary-dark: #1d4ed8; --text: #1f2328; --text-secondary: #656d76;
    --green: #16a34a; --red: #dc2626; --orange: #d97706; --gray-bg: #f7f8fa;
    --hover-bg: #f1f5f9;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
  .topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .topbar h1 { font-size: 18px; font-weight: 700; }
  .topbar h1 span { color: var(--primary); }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px 0; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; text-decoration: none; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--gray-bg); }
  .btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 6px; }
  .podcast-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
  .podcast-header h2 { font-size: 20px; font-weight: 700; }
  .stats { display: flex; gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px; text-align: center; }
  .stat-card .num { font-size: 24px; font-weight: 700; }
  .stat-card .label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .table-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .table-header h3 { font-size: 15px; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  thead th { padding: 0 16px; text-align: left; font-size: 12px; font-weight: 600; color: var(--text-secondary); background: var(--gray-bg); border-bottom: 1px solid var(--border); height: 40px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  tbody tr { border-bottom: 1px solid var(--border); height: 48px; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--hover-bg); }
  td { padding: 0 16px; vertical-align: middle; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .col-name { width: auto; }
  .col-date { width: 160px; }
  .col-dur { width: 100px; }
  .col-status { width: 120px; }
  .col-free { width: 70px; }
  .done-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; background: #dcfce7; color: #166534; }
  .pending-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; background: #fef3c7; color: #92400e; }
  .paid-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; background: #f3f4f6; color: #9ca3af; cursor: not-allowed; }
  .failed-link { color: #dc2626; text-decoration: none; font-weight: 500; cursor: pointer; }
  .failed-link:hover { text-decoration: underline; }
  .undone-link { color: #d97706; text-decoration: none; font-weight: 500; cursor: pointer; }
  .undone-link:hover { text-decoration: underline; }
  .done-link { color: #166534; text-decoration: none; font-weight: 500; cursor: pointer; }
  .done-link:hover { text-decoration: underline; }
  .paused-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; background: #ede9fe; color: #5b21b6; }
  .transcribing-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; background: #dbeafe; color: #1d4ed8; }
  .spin-icon { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(29,78,216,0.2); border-top-color: #1d4ed8; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 4px; vertical-align: middle; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .pagination { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-top: 1px solid var(--border); background: var(--gray-bg); }
  .page-info { font-size: 13px; color: var(--text-secondary); }
  .page-btns { display: flex; gap: 6px; align-items: center; }
  .page-btns .btn { min-width: 36px; justify-content: center; }
  .page-btns .btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .dialog-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
  .dialog-overlay.show { display: flex; }
  .dialog { background: var(--card); border-radius: 14px; padding: 28px; width: 480px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
  .dialog h3 { font-size: 16px; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
  .dialog-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  #toast { position: fixed; bottom: 24px; right: 24px; background: #1f2328; color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 13px; z-index: 300; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  #toast.show { opacity: 1; }
  #toast.error { background: var(--red); }
  #toast.success { background: var(--green); }
  #error-dialog-overlay .dialog { width: 420px; }
  #error-msg-text { margin: 16px 0; color: var(--text); font-size: 13px; white-space: pre-wrap; }
  .loading-overlay { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--text-secondary); }
</style>
</head>
<body>

<div class="topbar">
  <h1><span>Voice</span>ToFile</h1>
  <div style="margin-left:8px;color:var(--text-secondary);font-size:14px;">›</div>
  <span style="font-size:14px;color:var(--text-secondary);">{{ podcast.name }}</span>
  <div class="topbar-right">
    <button class="btn btn-secondary btn-sm" onclick="window.open('/queue', '_blank')">📋 队列</button>
    <button class="btn btn-secondary btn-sm" onclick="window.open('/', '_blank')">🏠 首页</button>
  </div>
</div>

<div class="container">
  <div class="podcast-header">
    <h2>📻 {{ podcast.name }}</h2>
    <button class="btn btn-secondary btn-sm" onclick="refreshDetail()">🔄 刷新</button>
    <button class="btn btn-secondary btn-sm" onclick="downloadAllUndone()">📥 全部入队</button>
  </div>

  <div class="stats" id="stats">
    <div class="stat-card"><div class="num" id="stat-done" style="color:var(--green);">—</div><div class="label">已转文字</div></div>
    <div class="stat-card"><div class="num" id="stat-pending" style="color:var(--orange);">—</div><div class="label">未转文字</div></div>
    <div class="stat-card"><div class="num" id="stat-paid" style="color:#9ca3af;">—</div><div class="label">付费</div></div>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <h3>📋 全部剧集</h3>
    </div>
    <table>
      <thead>
        <tr>
          <th class="col-name">标题</th>
          <th class="col-date">发布时间</th>
          <th class="col-dur">长度</th>
          <th class="col-status">状态</th>
          <th class="col-free">免费</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- 错误弹框 -->
<div class="dialog-overlay" id="error-dialog-overlay">
  <div class="dialog">
    <h3>❌ 错误信息</h3>
    <div id="error-msg-text"></div>
    <div class="dialog-footer">
      <button class="btn btn-primary" onclick="closeErrorDialog()">关闭</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const PODCAST_ID = {{ podcast.id }};
const PAGE_SIZE = 20;
let episodes = [];
let currentPage = 1;
let _failedEpisodeId = null;

// ============ 工具 ============
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr.substring(5, 10);
  return `${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}

function toast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type === 'error' ? ' error' : type === 'success' ? ' success' : '');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function showErrorMsg(msg) {
  document.getElementById('error-msg-text').textContent = msg;
  document.getElementById('error-dialog-overlay').classList.add('show');
}
function closeErrorDialog() {
  document.getElementById('error-dialog-overlay').classList.remove('show');
}

// ============ 加载 ============
async function loadDetail() {
  try {
    const resp = await fetch(`/api/podcast/${PODCAST_ID}/episodes`);
    const data = await resp.json();
    if (data.ok) {
      episodes = data.episodes;
      renderPage(1);
      updateStats();
    } else {
      toast('加载失败: ' + (data.error || '未知错误'), 'error');
    }
  } catch (e) {
    toast('加载失败: ' + e.message, 'error');
  }
}

async function refreshDetail() {
  toast('刷新中...', 'info');
  delete window._episodeCache;
  await loadDetail();
  toast('刷新成功', 'success');
}

// ============ 渲染 ============
function updateStats() {
  const total = episodes.length;
  const paid = episodes.filter(e => e.is_paid).length;
  const done = episodes.filter(e => e.status === 'done_deleted').length;
  const pending = episodes.filter(e => !e.is_paid && e.status !== 'done_deleted').length;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-paid').textContent = paid;
}

function renderPage(page) {
  currentPage = page;
  const totalPages = Math.ceil(episodes.length / PAGE_SIZE) || 1;
  const start = (page - 1) * PAGE_SIZE;
  const slice = episodes.slice(start, start + PAGE_SIZE);

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = slice.map(ep => {
    const isDone = ep.status === 'done_deleted';
    const isPaid = ep.is_paid;
    const isFailed = ep.status === 'failed';
    const isPaused = ep.status === 'paused';
    const isProcessing = ep.status === 'downloading' || ep.status === 'transcribing';
    const isQueued = ep.status === 'queued';
    let statusHtml;

    if (isDone) {
      statusHtml = `<a href="#" class="done-link" onclick="event.preventDefault();openTxt(${ep.id})">已转化</a>`;
    } else if (isPaid) {
      statusHtml = '<span class="paid-tag">不可转</span>';
    } else if (isPaused) {
      statusHtml = `<a href="#" class="undone-link" style="color:#7c3aed;" onclick="event.preventDefault();resumeEpisode(${ep.id})">待续转</a>`;
    } else if (isFailed) {
      statusHtml = `<a href="#" class="failed-link" onclick="event.preventDefault();showFailedDialog(${ep.id})">失败</a>`;
    } else if (isProcessing) {
      statusHtml = '<span class="transcribing-tag"><span class="spin-icon"></span>处理中</span>';
    } else if (isQueued) {
      statusHtml = '<span class="pending-tag">排队中</span>';
    } else {
      statusHtml = `<a href="#" class="undone-link" onclick="event.preventDefault();enqueueEpisode(${ep.id})">未转化</a>`;
    }

    const freeHtml = isPaid ? '<span class="paid-tag">收费</span>' : '<span class="done-tag">免费</span>';
    const xiaoyuzhouUrl = `https://www.xiaoyuzhoufm.com/episode/${ep.eid}`;

    return `<tr>
      <td class="col-name"><a href="${xiaoyuzhouUrl}" target="_blank" style="color:var(--text);text-decoration:none;">${isProcessing ? '<span class="spin-icon"></span>' : ''}${escapeHtml(ep.name)}</a></td>
      <td>${formatDate(ep.pub_date)}</td>
      <td>${ep.duration_str || '—'}</td>
      <td>${statusHtml}</td>
      <td>${freeHtml}</td>
    </tr>`;
  }).join('');

  const startIdx = start + 1;
  const endIdx = Math.min(start + PAGE_SIZE, episodes.length);
  const pagination = document.getElementById('pagination');
  pagination.innerHTML = `
    <span class="page-info">显示 ${startIdx}-${endIdx} 条，共 ${episodes.length} 条</span>
    <div class="page-btns">
      <button class="btn btn-secondary btn-sm" ${page <= 1 ? 'disabled' : ''} onclick="renderPage(${page - 1})">上一页</button>
      ${Array.from({length: Math.min(5, totalPages)}, (_, i) => {
        const p = i + 1;
        return `<button class="btn btn-secondary btn-sm ${p === page ? 'active' : ''}" onclick="renderPage(${p})">${p}</button>`;
      }).join('')}
      <button class="btn btn-secondary btn-sm" ${page >= totalPages ? 'disabled' : ''} onclick="renderPage(${page + 1})">下一页</button>
    </div>
  `;
}

// ============ 操作 ============
async function enqueueEpisode(episodeId) {
  try {
    const resp = await fetch('/api/episodes/enqueue', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ episode_ids: [episodeId] })
    });
    const data = await resp.json();
    if (data.ok) {
      toast('已加入队列', 'success');
      await loadDetail();
    } else {
      toast('加入队列失败: ' + (data.error || '未知错误'), 'error');
    }
  } catch (e) {
    toast('加入队列失败', 'error');
  }
}

async function resumeEpisode(episodeId) {
  try {
    const resp = await fetch(`/api/episode/resume/${episodeId}`, { method: 'POST' });
    const data = await resp.json();
    if (data.ok) {
      toast('已继续处理', 'success');
      await loadDetail();
    } else {
      toast('继续失败: ' + (data.error || '未知错误'), 'error');
    }
  } catch (e) {
    toast('继续失败', 'error');
  }
}

async function openTxt(episodeId) {
  try {
    const resp = await fetch(`/api/episode/open/${episodeId}`);
    const data = await resp.json();
    if (!data.ok) toast(data.error || '打开失败', 'error');
  } catch (e) {
    toast('打开失败', 'error');
  }
}

async function showFailedDialog(episodeId) {
  _failedEpisodeId = episodeId;
  let errorMsg = '任务处理失败';
  try {
    const resp = await fetch(`/api/episode/${episodeId}`);
    const data = await resp.json();
    if (data.episode && data.episode.error_msg) errorMsg = data.episode.error_msg;
  } catch (e) {}
  const footer = document.querySelector('#error-dialog-overlay .dialog-footer');
  footer.innerHTML = `
    <button class="btn btn-secondary" onclick="closeErrorDialog()">取消</button>
    <button class="btn btn-primary" onclick="retryFailed()">重新开始</button>
  `;
  document.getElementById('error-msg-text').textContent = errorMsg;
  document.getElementById('error-dialog-overlay').classList.add('show');
}

async function retryFailed() {
  if (!_failedEpisodeId) return;
  const id = _failedEpisodeId;
  closeErrorDialog();
  try {
    const resp = await fetch(`/api/episode/retry/${id}`, { method: 'POST' });
    const data = await resp.json();
    if (data.ok) {
      toast('已重新加入队列', 'success');
      await loadDetail();
    } else {
      toast('重新开始失败: ' + (data.error || '未知错误'), 'error');
    }
  } catch (e) {
    toast('重新开始失败', 'error');
  }
  _failedEpisodeId = null;
}

async function downloadAllUndone() {
  const undone = episodes.filter(e => !e.is_paid && e.status !== 'done_deleted');
  if (undone.length === 0) { toast('没有可入队的剧集', 'info'); return; }
  try {
    const resp = await fetch('/api/episodes/enqueue', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ podcast_id: PODCAST_ID, eids: undone.map(e => e.eid) })
    });
    const data = await resp.json();
    if (data.ok) {
      toast(`已加入 ${data.count} 集到队列`, 'success');
      await loadDetail();
    } else {
      toast('加入队列失败: ' + (data.error || '未知错误'), 'error');
    }
  } catch (e) {
    toast('加入队列失败', 'error');
  }
}

// SSE 实时更新
const evtSource = new EventSource('/sse/stream');
evtSource.onerror = () => {};
evtSource.addEventListener('task_update', async (e) => {
  const task = JSON.parse(e.data);
  const ep = episodes.find(ep => ep.eid === task.eid);
  if (ep) {
    ep.status = task.status;
    ep.progress = task.progress;
    renderPage(currentPage);
    updateStats();
  }
});
evtSource.addEventListener('task_done', async (e) => {
  const task = JSON.parse(e.data);
  if (episodes.find(ep => ep.eid === task.eid)) {
    await loadDetail();
  }
});

// ============ 启动 ============
loadDetail();
</script>
</body>
</html>
